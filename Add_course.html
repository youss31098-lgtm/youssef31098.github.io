<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/Add_course.css">
    <title>Add Courses - Personal Organizer</title>
</head>

<body>
    <header>
        <div class="countainer">
            <h1>Course Organizer</h1>
            <nav>
                <ul>
                    <li><a href="Home2.html">Home </a></li>
                    <li><a href="Courses.html">My Courses</a> </li>
                    <li><a href="Add_course.html" class="Active">Add Courses</a></li>
                    <li><a href="Contact_Us.html">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="countainer">
        <section class="form-section">
            <h2>Courses Adding steps</h2>
            <p>Fill in the details below to keep track of your new academic course.</p>
            <div class="contact-grid">
                <div class="contact-info">
                    <form>
                        <label>Course Name</label>
                        <p><input type="text" placeholder="e.g Game Development" required></p>
                        <label>Instructor Name </label>
                        <p><input type="text" placeholder="e.g Dr. yassin" required></p>
                        <label>Credit Hours</label>
                        <p><input type="number" min="1" max="4" required></p>



                        <label>Additional Notes</label>
                        <div class="form-group">
                            <textarea rows="4" placeholder="Any specific goals or dates"></textarea>
                            <button type="submit" class="submit-btn">Save Course</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="links">
            <p>Follow Us</p>
            <ul>
                <li><a href="http://facebook">Facebook</a></li>
                <li><a href="http://whatsapp">WhatsApp</a></li>
                <li><a href="http://instagram">Instagram</a></li>

            </ul>
        </div>
        <p>&copy; 2026 Personal Course Organizer | Spring Semester Task</p>

    </footer>
